name: CI

on:
  # push:
    # branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore GymClassBooking.slnx

      - name: Build
        run: dotnet build GymClassBooking.slnx --no-restore --configuration Release

      - name: Run unit tests
        run: dotnet test tests/GymClassBooking.UnitTests/GymClassBooking.UnitTests.csproj --no-build --configuration Release --verbosity normal

      - name: Run integration tests
        run: dotnet test tests/GymClassBooking.IntegrationTests/GymClassBooking.IntegrationTests.csproj --no-build --configuration Release --verbosity normal
